{% extends "base.html" %}
{% block title %}CiberEscudo — Iniciar Sesión{% endblock %}

{% block body %}
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="text-center mb-4">
      <i class="bi bi-shield-check fs-1 text-accent"></i>
      <h1 class="fw-bold mt-2 mb-1" style="font-size:1.6rem; letter-spacing:1px;">CiberEscudo</h1>
      <p class="text-muted-ce" style="font-size:.85rem;">Análisis de amenazas en tiempo real</p>
    </div>

    <hr style="border-color: var(--border); margin: 0 -32px 24px;">

    <!-- Form -->
    <form class="form-ce" action="/auth/login" method="POST">
      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" name="user" class="form-control" placeholder="Ingresa tu usuario" required>
      </div>
      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="position-relative">
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••"
            required>
          <button type="button"
            class="btn btn-link position-absolute end-0 top-50 translate-middle-y pe-3 text-muted-ce"
            onclick="togglePassword()" style="background:none; border:none; font-size:.9rem;">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      {% if error %}
      <div class="alert d-flex align-items-center gap-2 mb-3 py-2 px-3"
        style="background:var(--danger-bg); border:1px solid var(--danger); border-radius:8px; color:var(--danger); font-size:.85rem;">
        <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
      </div>
      {% endif %}
      <button type="submit" class="btn btn-ce-primary w-100">Iniciar Sesión</button>
    </form>

    <!-- Divider -->
    <div class="divider-or my-4">o</div>

    <!-- Sign up -->
    <p class="text-center mb-0" style="font-size:.85rem;">
      ¿No tienes cuenta?
      <a href="#" class="text-accent text-decoration-none fw-semibold">Regístrate gratis</a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function togglePassword() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  }
</script>
{% endblock %}
